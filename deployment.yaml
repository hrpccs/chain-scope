apiVersion: v1
kind: Service
metadata:
  name: controller
  namespace: chain-scope
spec:
  selector:
    app: chain-scope-controller
  ports:
    # - name: ui
    #   port: 16686
    #   targetPort: 16686
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    # - name: grpc
    #   port: 14250
    #   targetPort: 14250
  type: ClusterIP
---
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: chain-scope-controller
  namespace: chain-scope
  labels:
    name: chain-scope-controller
    app: chain-scope-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      name: chain-scope-controller
      app: chain-scope-controller
  template:
    metadata:
      labels:
        name: chain-scope-controller
        app: chain-scope-controller
    spec:
      containers:
        - name: chain-scope-controller
          image: chainscope1234/controller:dev
          imagePullPolicy: Always
          resources:
            requests:
              ephemeral-storage: "2Gi"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DEBUG
              value: "False"
            - name: IDLE
              value: "False"
            - name: CHAIN_INTERVAL
              value: "5"
            - name: COLLECT_INTERVAL
              value: "5"
            - name: ALGORITHM
              value: "tag-based"
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              preference:
                matchExpressions:
                  - key: benchmark
                    operator: In
                    values:
                      - controller
