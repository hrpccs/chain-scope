##################################################################################################
# Proxy
##################################################################################################
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: nginx-test
spec:
  ports:
  - port: 9080
    targetPort: 8080
    nodePort: 30001
  selector:
    app: nginx
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: nginx-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
        app-type: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.27.5
        imagePullPolicy: IfNotPresent
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
          items:
          - key: nginx.conf
            path: nginx.conf
      nodeSelector:
        benchmark-proxy: 'true'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: nginx-test
data:
  nginx.conf: |
    user www-data;
    worker_processes 2;
    worker_rlimit_nofile 65535;
    pid /run/nginx.pid;
    #include /etc/nginx/modules-enabled/*.conf;

    events {
      worker_connections 4096;
      multi_accept on;
      use epoll;
    }

    http {

      ##
      # Basic Settings
      ##
      
      #limit_conn_zone $server_name zone=perserver:32m;
      #limit_conn_zone $binary_remote_addr zone=per_addr:32m;
      #limit_req_zone $binary_remote_addr zone=one:10m rate=1r/s;
      
      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;
      types_hash_max_size 2048;
      keepalive_timeout 15;
      server_tokens off;

      # server_names_hash_bucket_size 64;
      # server_name_in_redirect off;

      include /etc/nginx/mime.types;
      default_type application/octet-stream;
    
      log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';
      log_format minimal '$remote_addr [$time_local] "$request" '
                         '$status $body_bytes_sent';

      access_log /var/log/nginx/access.log minimal buffer=32k flush=5s;
      error_log /var/log/nginx/error.log warn;

      include /etc/nginx/conf.d/*.conf;
      #include /etc/nginx/sites-enabled/*;

      upstream webservers {
        server web:9080;
        keepalive 32;
      }
      server {
        listen 8080;
        location / {
          #limit_conn per_addr 1;
          #limit_req zone=one burst=5 nodelay;
          access_log off;
          proxy_pass http://webservers;
          proxy_buffering off;
          proxy_buffer_size 4k;
          proxy_buffers 8 4k;
          proxy_busy_buffers_size 8k;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          #proxy_connect_timeout 60s;
          #proxy_send_timeout 60s;
          #proxy_read_timeout 300s;
        }
      }
    }
