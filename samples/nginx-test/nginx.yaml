apiVersion: v1
kind: Namespace
metadata:
  name: nginx-test
---
##################################################################################################
# Web server
##################################################################################################
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: nginx-test
spec:
  ports:
    - port: 9080
      targetPort: 9080
      nodePort: 30000
  selector:
    app: nginx-web
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: nginx-test
spec:
  replicas: 1
  selector:
    matchLabels:
        app: nginx-web
  template:
    metadata:
      labels:
        app: nginx-web
    spec:
      containers:
      - name: web
        image: nginx:1.27.5
        imagePullPolicy: IfNotPresent
        volumeMounts:
        - name: web-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: web-files
          mountPath: /etc/nginx/files
      volumes:
      - name: index-html
        configMap:
          name: index-html
          items:
          - key: index.html
            path: index.html
      - name: web-config
        configMap:
          name: web-config
          items:
          - key: nginx.conf
            path: nginx.conf
      - name: web-files
        configMap:
          name: web-files
      nodeSelector:
        benchmark-web: 'true'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-config
  namespace: nginx-test
data:
  nginx.conf: |
    worker_processes 1;
    worker_rlimit_nofile 65535;
    pid        /var/run/nginx.pid;
    events {
      worker_connections 10000;
      use epoll;
    }
    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;
      log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';
      log_format minimal '$remote_addr [$time_local] "$request" '
                         '$status $body_bytes_sent';
      access_log  /var/log/nginx/access.log minimal buffer=32k flush=5s;
      error_log  /var/log/nginx/error.log warn;
      sendfile        on;
      tcp_nopush     on;
      tcp_nodelay on;
      keepalive_timeout  65;
      server_tokens off;
      open_file_cache max=200000 inactive=20s;
      open_file_cache_valid 30s;
      open_file_cache_min_uses 2;
      #gzip  on;
      include /etc/nginx/conf.d/*.conf;
      server {
        root /etc/nginx;
        listen 9080;
        location /files/ {
          access_log off;
        }
        location /test {
          access_log off;
          return 200 'hello world!\n';
        }
      }
    }
---
